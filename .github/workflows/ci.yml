name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  desktop:
    name: Desktop build and Rust tests
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Show tool versions
        run: |
          node --version
          pnpm --version
          rustc --version
          cargo --version

      - name: Run secret scan
        run: node scripts/secret-scan.mjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop frontend
        run: pnpm --filter @deepseek-agent-os/desktop build

      - name: Run onboarding and settings contract tests
        run: |
          node scripts/settings-panel.test.mjs
          node scripts/onboarding-readiness.test.mjs
          node scripts/windows-installed-ui-smoke.mjs --self-test
          node scripts/release-local-check.mjs --self-test

      - name: Run Rust tests
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}\deepseek-agent-os-cargo-target
          TAURI_CONFIG: '{"bundle":{"active":false,"resources":null}}'
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Run source-only release guard
        run: pnpm test:release-source
